name: Generate & Upload Payroll Reminder Images

on:
  # Runs at 8:30 AM PHT (00:30 UTC) on the 10th and 25th of every month
  # This ensures images are ready before the Power Automate flow fires at 9:00 AM PHT
  schedule:
    - cron: "30 0 10,25 * *"

  # Allow manual runs for testing (e.g. if you need to re-generate for a specific date)
  workflow_dispatch:
    inputs:
      date:
        description: "Date to generate for (YYYY-MM-DD). Leave blank to use today."
        required: false
        default: ""

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to push the generated images back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install jinja2 playwright python-dotenv

      - name: Install Playwright Chromium
        run: python -m playwright install chromium --with-deps

      - name: Generate images
        env:
          DATE_ARG: ${{ github.event.inputs.date }}
        run: |
          mkdir -p images
          if [ -n "$DATE_ARG" ]; then
            python image_generator/generate_images.py "$DATE_ARG"
          else
            python image_generator/generate_images.py
          fi
          cp "image_generator/output/Reminder 1.png" "images/Reminder 1.png"
          cp "image_generator/output/Payroll Cut-off & Approval Period.png" "images/Payroll Cut-off & Approval Period.png"

      - name: Commit and push images
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "images/Reminder 1.png" "images/Payroll Cut-off & Approval Period.png"
          git diff --staged --quiet || git commit -m "chore: update payroll reminder images [skip ci]"
          git push
